<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DAT.co mNAV Dashboard</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #0b0f1c 0%, #12172f 100%);
            min-height: 100vh;
            padding: 24px;
            color: #eef2ff;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 28px 20px;
            background: rgba(18, 23, 47, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #f5b042, #ffdd77);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #8d9bc0;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* 選擇器與卡片區 */
        .control-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .company-selector {
            background: #1e253f;
            border: 1px solid #2f3a60;
            border-radius: 60px;
            padding: 8px 20px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #ffdd99;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .company-selector:hover {
            background: #2a345a;
            border-color: #f5b042;
        }

        /* 三卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: rgba(18, 23, 47, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 20px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            border-color: #f5b04260;
            transform: translateY(-3px);
        }

        .card-label {
            font-size: 0.75rem;
            text-transform: none;
            letter-spacing: 2px;
            color: #9aa9cf;
            margin-bottom: 12px;
        }

        .card-value {
            font-size: 1.9rem;
            font-weight: 700;
            color: #f5d97f;
            word-break: break-word;
        }

        .card-unit {
            font-size: 0.9rem;
            color: #b9c3e6;
            margin-left: 6px;
        }

        .card-sub {
            font-size: 0.7rem;
            color: #6f7da8;
            margin-top: 8px;
        }

        /* 圖表容器 */
        .chart-wrapper {
            background: rgba(18, 23, 47, 0.6);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        canvas {
            max-height: 450px;
            width: 100%;
        }

        .info-note {
            text-align: center;
            font-size: 0.75rem;
            color: #6f7da8;
            margin-top: 16px;
            border-top: 1px solid #232b48;
            padding-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 48px;
            font-style: italic;
            color: #b9c3e6;
        }

        .error-msg {
            color: #ffaa88;
            background: #2a1a1a;
            padding: 16px;
            border-radius: 28px;
            text-align: center;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #4a5580;
            margin-top: 32px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>mNAV Dashboard</h1>
        <div class="sub">Daily Update</div>
    </div>

    <div class="control-bar">
        <select id="companySelect" class="company-selector">
            <option value="MSTR">Strategy (MSTR)</option>
            <option value="MARA">MARA Holdings, Inc. (MARA)</option>
            <option value="XXI">Twenty One Capital (XXI)</option>
            <option value="MTPLF">Metaplanet Inc. (MTPLF)</option>
            <option value="CEPO">Bitcoin Standard Treasury Company (CEPO)</option>
            <option value="BLSH">Bullish (BLSH)</option>
            <option value="RIOT">Riot Platforms, Inc. (RIOT)</option>
            <option value="COIN">Coinbase Global, Inc. (COIN)</option>
            <option value="HUT">Hut 8 Mining Corp (HUT)</option>
            <option value="CLSK">CleanSpark, Inc. (CLSK)</option>
        </select>
    </div>

    <!-- 關鍵數值卡片 -->
    <div class="stats-grid">
        <div class="card">
            <div class="card-label">📈 Latest mNAV</div>
            <div class="card-value" id="latestMnav">--</div>
            <div class="card-sub" id="latestDate">等待載入</div>
        </div>
        <div class="card">
            <div class="card-label">💰 BTC Holdings</div>
            <div class="card-value" id="btcHoldings">--</div>
            <div class="card-sub">比特幣數量</div>
        </div>
        <div class="card">
            <div class="card-label">💵 BTC Price (USD)</div>
            <div class="card-value" id="btcPrice">--</div>
            <div class="card-sub">最新記錄時價格</div>
        </div>
    </div>

    <div class="chart-wrapper">
        <div class="card-label" style="margin-bottom: 16px;">📉 mNAV History (Daily)</div>
        <canvas id="mnavChart" width="800" height="400"></canvas>
    </div>
    <div class="info-note">
        ⚡ 資料來源：BitcoinTreasuries.net API<br>
        📐 mNAV = (股價 × 流通股數) / (BTC持倉 × BTC現價)
    </div>
    <footer>🔁 每日自動更新數據</footer>
</div>

<script>
    // ---------- 公司列表（與下拉選單對應）----------
    const companies = {
        MSTR: "Strategy (MSTR)",
        MARA: "MARA Holdings, Inc. (MARA)",
        XXI: "Twenty One Capital (XXI)",
        MTPLF: "Metaplanet Inc. (MTPLF)",
        CEPO: "Bitcoin Standard Treasury Company (CEPO)",
        BLSH: "Bullish (BLSH)",
        RIOT: "Riot Platforms, Inc. (RIOT)",
        COIN: "Coinbase Global, Inc. (COIN)",
        HUT: "Hut 8 Mining Corp (HUT)",
        CLSK: "CleanSpark, Inc. (CLSK)"
    };

    let currentChart = null;     // 儲存 Chart.js 實例
    let currentData = [];        // 儲存處理後的每日資料 { date, mNav, btcPrice, btcHoldings }

    // 輔助：將 ISO 日期字串轉為 YYYY-MM-DD
    function toYMD(isoString) {
        return isoString.slice(0, 10);
    }

    // 從 history 陣列中，按天聚合：每天保留最後一條 (recordedAt 最晚)
    function aggregateDaily(history) {
        if (!history || history.length === 0) return [];

        // 先依照 recordedAt 排序 (由舊到新，方便後續取最後一條)
        const sorted = [...history].sort((a, b) => new Date(a.recordedAt) - new Date(b.recordedAt));

        const dailyMap = new Map(); // key: YYYY-MM-DD, value: 該日最後一條記錄
        for (const record of sorted) {
            const day = toYMD(record.recordedAt);
            dailyMap.set(day, record); // 因為已排序，後面的會覆蓋前面的 => 保留最晚
        }

        // 轉為陣列並按日期排序 (由舊到新)
        const aggregated = Array.from(dailyMap.entries()).map(([date, record]) => ({
            date: date,
            mNav: record.mNav,
            btcPrice: record.btcPrice,
            btcHoldings: record.btcHoldings,
            rawRecord: record
        }));
        aggregated.sort((a, b) => a.date.localeCompare(b.date));
        return aggregated;
    }

    // 更新卡片資訊 (使用最新日期的記錄)
    function updateCards(dailyData) {
        if (!dailyData.length) {
            document.getElementById('latestMnav').innerText = '無資料';
            document.getElementById('latestDate').innerText = '無效';
            document.getElementById('btcHoldings').innerText = '--';
            document.getElementById('btcPrice').innerText = '--';
            return;
        }
        const latest = dailyData[dailyData.length - 1];
        document.getElementById('latestMnav').innerHTML = latest.mNav.toFixed(4);
        document.getElementById('latestDate').innerHTML = `更新至 ${latest.date}`;
        
        // 顯示 BTC 持倉 (若該筆記錄有 btcHoldings)
        const holdings = latest.btcHoldings;
        if (holdings !== undefined && holdings !== null) {
            document.getElementById('btcHoldings').innerHTML = Number(holdings).toLocaleString() + ' <span class="card-unit">BTC</span>';
        } else {
            document.getElementById('btcHoldings').innerText = 'N/A';
        }
        
        const price = latest.btcPrice;
        if (price !== undefined && price !== null) {
            document.getElementById('btcPrice').innerHTML = '$' + Number(price).toLocaleString();
        } else {
            document.getElementById('btcPrice').innerText = '--';
        }
    }

    // 繪製圖表
    function renderChart(dailyData) {
        const ctx = document.getElementById('mnavChart').getContext('2d');
        if (currentChart) {
            currentChart.destroy();
        }
        
        const labels = dailyData.map(d => d.date);
        const mnavValues = dailyData.map(d => d.mNav);
        
        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'mNAV Basic',
                    data: mnavValues,
                    borderColor: '#f5a623',
                    backgroundColor: 'rgba(245, 166, 35, 0.03)',
                    borderWidth: 2.5,
                    pointRadius: 1.5,
                    pointHoverRadius: 5,
                    pointBackgroundColor: '#ffb347',
                    tension: 0.2,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: (context) => `mNAV: ${context.raw.toFixed(4)}`
                        }
                    },
                    legend: { labels: { color: '#cbd5e8' } }
                },
                scales: {
                    y: {
                        title: { display: true, text: 'mNAV 倍數', color: '#a0aad0' },
                        grid: { color: '#2a345a' },
                        ticks: { color: '#cbd5e8' }
                    },
                    x: {
                        ticks: { color: '#a0aad0', maxRotation: 45, autoSkip: true },
                        grid: { display: false }
                    }
                }
            }
        });
    }

    // 載入指定公司的 JSON 檔案並更新 UI
    async function loadCompany(symbol) {
        const loadingMsg = document.getElementById('latestMnav');
        loadingMsg.innerHTML = '⏳ 載入中...';
        document.getElementById('latestDate').innerText = '讀取資料';
        
        try {
            // 假設 JSON 檔案放在與 index.html 同目錄下，檔名為 MSTR.json, MARA.json 等
            const response = await fetch(`${symbol}.json`);
            if (!response.ok) {
                throw new Error(`無法載入 ${symbol}.json，請確認檔案存在`);
            }
            const jsonData = await response.json();
            
            // 解析 API 回傳結構: { success, data: { history: [...] } }
            if (!jsonData.success || !jsonData.data || !jsonData.data.history) {
                throw new Error('JSON 格式不符，缺少 history 陣列');
            }
            
            const history = jsonData.data.history;
            if (!history.length) {
                throw new Error('該公司無歷史數據');
            }
            
            // 按天聚合 (每天取最後一筆)
            const daily = aggregateDaily(history);
            if (daily.length === 0) {
                throw new Error('聚合後無有效數據');
            }
            
            currentData = daily;
            updateCards(daily);
            renderChart(daily);
            
        } catch (error) {
            console.error(error);
            document.getElementById('latestMnav').innerHTML = '❌ 錯誤';
            document.getElementById('latestDate').innerHTML = error.message;
            document.getElementById('btcHoldings').innerText = '--';
            document.getElementById('btcPrice').innerText = '--';
            if (currentChart) {
                currentChart.destroy();
                currentChart = null;
            }
            // 清空圖表畫布
            const ctx = document.getElementById('mnavChart').getContext('2d');
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        }
    }

    // 監聽下拉選單變化
    const selectEl = document.getElementById('companySelect');
    selectEl.addEventListener('change', (e) => {
        loadCompany(e.target.value);
    });

    // 初始載入預設公司 (MSTR)
    loadCompany('MSTR');
</script>
</body>
</html>
